{{ define "main" }}
  <div class="container">
    <h1 class="title">归档</h1>
    {{ range .Site.RegularPages.GroupByDate "2006年" }}
      <h2 class="year">{{ .Key }}</h2>
      <ul class="posts">
        {{ range .Pages }}
          <li class="post">
            <a href=" ">
              <span class="post-title">{{ .Title }}</span>
              <span class="post-date">{{ .Date.Format "01-02" }}</span>
            </a >
          </li>
        {{ end }}
      </ul>
    {{ end }}
  </div>
{{ end }}
