<footer
  class="mx-auto flex h-[4.5rem] max-w-(--w) items-center px-8 text-xs tracking-wider uppercase opacity-60"
>
  <div class="mr-auto">
    {{- if site.Copyright -}} {{- site.Copyright -}} {{- else -}} &copy; {{-
    now.Year }}
    <a class="link" href="{{- `` | absURL -}}">{{- site.Title -}}</a>
    {{- end -}}
  </div>
  <a class="link mx-6" href="https://gohugo.io/" rel="noopener" target="_blank"
    >powered by hugo️️</a
  >️
  <a
    class="link"
    href="https://github.com/nanxiaobei/hugo-paper"
    rel="noopener"
    target="_blank"
    >hugo-paper</a
  >
  <!-- Umami 访客数卡片显示 -->
<div class="visitor-card" style="max-width: 400px; margin: 2rem auto; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.05); text-align: center;">
  <h3 style="margin: 0 0 1rem 0; font-size: 1rem;">博客访问统计</h3>
  <div style="display: flex; justify-content: space-around;">
    <div>
      <div style="font-size: 1.5rem; font-weight: bold;" id="umami-pv-card">--</div>
      <div style="font-size: 0.8rem; opacity: 0.8;">总访问量</div>
    </div>
    <div>
      <div style="font-size: 1.5rem; font-weight: bold;" id="umami-uv-card">--</div>
      <div style="font-size: 0.8rem; opacity: 0.8;">访客数</div>
    </div>
  </div>
</div>

<script>
const WEBSITE_ID = '913c1097-863d-43b7-9b47-e0fd9807aab0';
const API_URL = 'https://cloud.umami.is/api';

async function fetchStats() {
  try {
    const pvRes = await fetch(`${API_URL}/websites/${WEBSITE_ID}/stats?startAt=0&endAt=${Date.now()}`);
    const pvData = await pvRes.json();
    document.getElementById('umami-pv-card').textContent = pvData.pageviews.value;

    const uvRes = await fetch(`${API_URL}/websites/${WEBSITE_ID}/stats?startAt=0&endAt=${Date.now()}&type=visitors`);
    const uvData = await uvRes.json();
    document.getElementById('umami-uv-card').textContent = uvData.visitors.value;
  } catch (err) {
    console.log('Umami 统计加载失败:', err);
  }
}

window.addEventListener('load', fetchStats);
</script>
</footer>
