{{- if (not .Params.disableComments) -}}
<hr>
<h3>评论</h3>
<div id="waline"></div>

<link rel="stylesheet" href="https://unpkg.com/@waline/client@3/dist/waline.css" />
<script type="module">
  import { init } from 'https://unpkg.com/@waline/client@3/dist/waline.mjs';

  init({
    el: '#waline',
    // 这里先用官方演示服务，你后续可以换成自己的 Vercel 地址
    serverURL: 'https://waline.vercel.app',
    path: '{{ .RelPermalink }}',
    lang: 'zh-CN',
    dark: 'auto',
    emoji: [
      'https://cdn.jsdelivr.net/npm/@waline/emojis/qq'
    ],
    meta: ['nick', 'mail', 'link'],
    requiredMeta: ['nick'],
    placeholder: '文明发言，理性交流～',
  });
</script>
{{- end -}}
