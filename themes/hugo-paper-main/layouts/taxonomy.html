{{ define "main" }}
<div class="container">
  <h1 class="title">标签</h1>
  {{ if eq (len .Site.Taxonomies.tags) 0 }}
    <p class="empty-tip">还没有添加标签哦～</p >
  {{ else }}
    <div class="tags-list">
      {{ range .Site.Taxonomies.tags }}
        <a href=" " class="tag-item">
          <span class="tag-name">{{ .Page.Title }}</span>
          <span class="tag-count">({{ .Count }})</span>
        </a >
      {{ end }}
    </div>
  {{ end }}
</div>

<style>
.tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-top: 2rem;
}
.tag-item {
  padding: 0.5rem 1rem;
  background: #f5f5f5;
  border-radius: 8px;
  text-decoration: none;
  color: #333;
  transition: all 0.2s;
}
.tag-item:hover {
  background: #6366f1;
  color: #fff;
}
.tag-count {
  opacity: 0.7;
  font-size: 0.8rem;
  margin-left: 0.3rem;
}
.empty-tip {
  margin-top: 2rem;
  color: #666;
}
</style>
{{ end }}
