baseURL = "https://ayublog-github-io.vercel.app/"
languageCode = "zh-CN"
title = "钰de个人博客"
theme = "hugo-paper-main"

# 关键调整：关闭可能干扰 assets pipeline 的选项
relativeURLs = false
canonifyURLs = false

enableRobotsTXT = true

themesDir = "themes"

[taxonomies]
tag = "tags"
category = "categories"

[params]
theme = "light"
subtitle = "欢迎来到我的 Hugo 博客"
copyright = "© 2026 钰的个人博客"

show_summary = true
show_reading_time = true
show_tags = true
show_categories = true
paginate = 5

primary_color = "#6366f1"
background_color = "#fafafa"
text_color = "#333333"
link_color = "#6366f1"
dark_mode = true

[params.search]
enable = true
type = "local"

[params.toc]
enable = true
depth = 3

[params.footer]
show_visitor = false
powered_by = false
social = [
  { name = "GitHub", url = "https://github.com/wee533", icon = "github" }
]

[params.analytics.umami]
enable = true
website_id = "28e01c67-12a4-41df-bac5-5ebbfc3198bb"
src = "https://cloud.umami.is/script.js"
host_url = "https://cloud.umami.is"
auto_track = true
do_not_track = false

[menu]
[[menu.main]]
name = "首页"
url = "/"
weight = 1
[[menu.main]]
name = "文章"
url = "/posts/"
weight = 2
[[menu.main]]
name = "归档"
url = "/archives/"
weight = 3
[[menu.main]]
name = "标签"
url = "/tags/"
weight = 4
[[menu.main]]
name = "关于"
url = "/about/"
weight = 5