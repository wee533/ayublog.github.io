baseURL = "/"
languageCode = "zh-CN"
title = "钰的个人博客"
theme = "hugo-paper-main"
relativeURLs = false
canonifyURLs = false
enableRobotsTXT = true

[params]
theme = "light"
subtitle = "欢迎来到我的 Hugo 博客 🎉"
copyright = "© 2026 钰的个人博客"

# 📌 Umami 后端埋点（确保统计数据正常上报）
[params.analytics.umami]
enable = true
website_id = "913c1097-863d-43b7-9b47-e0fd9807aab0"
src = "https://cloud.umami.is/script.js"
host_url = "https://cloud.umami.is"
auto_track = true
do_not_track = false

[params.footer]
# 核心：关闭访客统计 UI（设为 false）
show_visitor = false

# 页脚保留默认文字（干净、简洁）
copyright = "© 2026 我的 PAPPERS 博客"
powered_by = true

[params.comment.utterances]
enable = true
repo = "wee533/ayublog.github.io"
issueTerm = "pathname"
theme = "github-light"
label = "blog-comment"

[params]
# 显示文章摘要（在文章里加 <!--more--> 就会显示摘要）
show_summary = true
# 显示阅读时间
show_reading_time = true
# 显示标签
show_tags = true
# 显示分类
show_categories = true
# 文章列表每页显示数量
paginate = 5

[menu]
# 首页
[[menu.main]]
name = "首页"
url = "/"
weight = 1

# 所有文章
[[menu.main]]
name = "文章"
url = "/posts/"
weight = 2

# 归档（按时间汇总）
[[menu.main]]
name = "归档"
url = "/archives/"
weight = 3

# 标签分类
[[menu.main]]
name = "标签"
url = "/tags/"
weight = 4

# 关于
[[menu.main]]
name = "关于"
url = "/about/"
weight = 5